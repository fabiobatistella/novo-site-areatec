server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/html;
    index index.html;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets with long cache (hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Images, fonts, videos with long cache
    location ~* \.(webp|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webm|mp4)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Favicon
    location = /favicon.svg {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # OG image
    location = /og-image.png {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Sitemap and robots.txt
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/xml";
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain";
    }

    # Pre-rendered route pages (served directly)
    location = /olhovivo-patrol {
        try_files /olhovivo-patrol/index.html =404;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }

    location = /olhovivo-parking {
        try_files /olhovivo-parking/index.html =404;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }

    # 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ /200.html;
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
    }
}
